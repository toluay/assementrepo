ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

providers:
  kubernetesIngress:
    enabled: true
    ingressClass: traefik
  kubernetesCRD:
    enabled: true

ports:
  web:
    port: 8000
    exposedPort: 80
    hostPort: 80          # binds port 80 on kind node → Mac localhost:80
  websecure:
    port: 8443
    exposedPort: 443
    hostPort: 443

service:
  type: ClusterIP         # hostPort handles external access on kind

deployment:
  replicas: 1
